services:
  db:
    image: postgres:16-alpine
    container_name: game-lib-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: matheusjtavares/gamelibrarymanager-api
    container_name: game-lib-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/gamelib
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - db

  ui:
    image: matheusjtavares/gamelibrarymanager-ui
    container_name: game-lib-ui
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: /api/v1
    depends_on:
      - api

volumes:
  postgres_data:
