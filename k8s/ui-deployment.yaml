apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gamelibrarymanager
  annotations:
    kompose.cmd: D:\Applications\Scoop\apps\kompose\current\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: ui
  name: ui
spec:
  replicas: 4
  selector:
    matchLabels:
      io.kompose.service: ui
  template:
    metadata:
      annotations:
        kompose.cmd: D:\Applications\Scoop\apps\kompose\current\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: ui
    spec:
      containers:
        - env:
            - name: VITE_API_BASE_URL
              value: /api/v1
          image: matheusjtavares/gamelibrarymanager-ui
          name: game-lib-ui
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      restartPolicy: Always
