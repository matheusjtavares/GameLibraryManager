apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gamelibrarymanager
  annotations:
    kompose.cmd: D:\Applications\Scoop\apps\kompose\current\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: db
  name: db
spec:
  replicas: 4
  selector:
    matchLabels:
      io.kompose.service: db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: D:\Applications\Scoop\apps\kompose\current\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: gamelib
            - name: POSTGRES_PASSWORD
              value: secret
            - name: POSTGRES_USER
              value: gameuser
          image: postgres:16-alpine
          name: game-lib-db
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      restartPolicy: Always
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
